<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Restaurante</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <main class="login-contenedor">
    <section class="login-box">
      <div class="logo-box">🍽</div>
      <h1>Sistema de Restaurante</h1>
      <p>Ingresa tus credenciales para continuar</p>

      <form class="formulario-login" onsubmit="event.preventDefault(); iniciarSesion();">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Ingresa tu usuario">

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña">

        <button type="submit" class="btn-principal">Ingresar</button>
      </form>

      <small>Credenciales de prueba: admin / admin</small>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
